<main class="min-h-dvh bg-zinc-950 text-white">
  <section class="mx-auto flex min-h-dvh w-full max-w-6xl flex-col justify-center px-6 py-16">
    <p class="mb-4 text-sm font-semibold uppercase tracking-[0.18em] text-cyan-300">
      {{ 'app.eyebrow' | transloco }}
    </p>

    <div class="max-w-3xl">
      <h1 class="text-4xl font-semibold leading-tight sm:text-6xl">
        {{ 'app.title' | transloco }}
      </h1>
      <p class="mt-6 max-w-2xl text-lg leading-8 text-zinc-300">
        {{ 'app.description' | transloco }}
      </p>
    </div>

    <div class="mt-10 grid gap-3 sm:grid-cols-2 lg:grid-cols-4">
      @for (toolKey of toolKeys; track toolKey) {
        <div class="rounded-lg border border-white/10 bg-white/5 px-4 py-3 text-sm text-zinc-100">
          {{ 'app.tools.' + toolKey | transloco }}
        </div>
      }
    </div>
  </section>
</main>

<router-outlet />
<app-toast-viewport position="top-right" />
