<button
  [type]="type()"
  [class]="classes()"
  [disabled]="disabled() || loading()"
  [attr.aria-busy]="loading()"
  [attr.aria-label]="ariaLabel() || null"
  (click)="handleClick()"
>
  @if (loading()) {
    <span class="button__spinner" aria-hidden="true"></span>
  }

  <span class="button__content">
    <ng-content />
  </span>
</button>
