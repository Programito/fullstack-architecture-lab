<div [class]="classes()">
  @if (label()) {
    <label class="form-field__label" [for]="controlId()">
      {{ label() }}
      @if (required()) {
        <span aria-hidden="true">*</span>
      }
    </label>
  }

  <ng-content />

  @if (error()) {
    <p class="form-field__error" [id]="errorId()">{{ error() }}</p>
  } @else if (hint()) {
    <p class="form-field__hint" [id]="hintId()">{{ hint() }}</p>
  }
</div>
