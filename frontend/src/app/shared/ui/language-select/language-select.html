<div [class]="classes()" (keydown.escape)="closeMenu()">
  @if (displayedLabel()) {
    <span class="language-select__label" [id]="labelId">{{ displayedLabel() }}</span>
  }

  <div class="language-select__control">
    <button
      class="language-select__trigger"
      type="button"
      [disabled]="disabled()"
      [attr.aria-label]="buttonAriaLabel()"
      aria-haspopup="listbox"
      [attr.aria-expanded]="isOpen()"
      [attr.aria-controls]="isOpen() ? listboxId : null"
      [attr.aria-describedby]="describedBy()"
      (click)="toggleMenu()"
    >
      <span class="language-select__globe" aria-hidden="true"></span>
      <span class="language-select__code">{{ selectedCode() }}</span>
      <span class="language-select__chevron" aria-hidden="true"></span>
    </button>

    @if (isOpen()) {
      <button
        class="language-select__backdrop"
        type="button"
        tabindex="-1"
        [attr.aria-label]="closeAriaLabel()"
        (click)="closeMenu()"
      ></button>

      <div
        class="language-select__menu"
        role="listbox"
        [id]="listboxId"
        [attr.aria-labelledby]="displayedLabel() ? labelId : null"
        [attr.aria-label]="displayedLabel() ? null : listboxAriaLabel()"
      >
        @for (option of options(); track option.value) {
          <button
            class="language-select__option"
            type="button"
            role="option"
            [attr.aria-selected]="option.value === value()"
            [attr.aria-label]="getOptionLabel(option.value, option.labelKey)"
            (click)="selectLocale(option.value)"
          >
            <span class="language-select__option-code">{{ option.value.toUpperCase() }}</span>
            <span class="language-select__option-label">{{ getTranslatedLabel(option.labelKey) }}</span>
            @if (option.value === value()) {
              <span class="language-select__check" aria-hidden="true"></span>
            }
          </button>
        }
      </div>
    }
  </div>

  @if (displayedHint()) {
    <p class="language-select__hint" [id]="hintId">{{ displayedHint() }}</p>
  }
</div>
