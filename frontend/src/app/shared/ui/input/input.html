<div [class]="fieldClasses()">
  @if (label()) {
    <label class="input-field__label" [for]="inputId()">
      {{ label() }}
      @if (required()) {
        <span aria-hidden="true">*</span>
      }
    </label>
  }

  <input
    [id]="inputId()"
    [class]="classes()"
    [type]="type()"
    [name]="name()"
    [value]="value()"
    [attr.autocomplete]="autocomplete()"
    [placeholder]="labelPlacement() === 'floating' ? ' ' : placeholder()"
    [attr.minlength]="minLength()"
    [attr.maxlength]="maxLength()"
    [attr.min]="min()"
    [attr.max]="max()"
    [attr.step]="step()"
    [disabled]="disabled()"
    [readOnly]="readonly()"
    [required]="required()"
    [attr.aria-invalid]="error() ? true : null"
    [attr.aria-describedby]="describedBy()"
    (input)="handleInput($event)"
  />

  @if (error()) {
    <p class="input-field__error" [id]="inputId() + '-error'">{{ error() }}</p>
  } @else if (hint()) {
    <p class="input-field__hint" [id]="inputId() + '-hint'">{{ hint() }}</p>
  }
</div>
