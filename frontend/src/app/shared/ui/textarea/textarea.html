<div [class]="fieldClasses()">
  @if (label()) {
    <label class="textarea-field__label" [for]="textareaId">
      {{ label() }}
      @if (required()) {
        <span aria-hidden="true">*</span>
      }
    </label>
  }

  <textarea
    [id]="textareaId"
    [class]="classes()"
    [name]="name()"
    [rows]="rows()"
    [value]="value()"
    [placeholder]="labelPlacement() === 'floating' ? ' ' : placeholder()"
    [disabled]="disabled()"
    [readOnly]="readonly()"
    [required]="required()"
    [attr.aria-invalid]="error() ? true : null"
    [attr.aria-describedby]="describedBy()"
    (input)="handleInput($event)"
  ></textarea>

  @if (error()) {
    <p class="textarea-field__error" [id]="textareaId + '-error'">{{ error() }}</p>
  } @else if (hint()) {
    <p class="textarea-field__hint" [id]="textareaId + '-hint'">{{ hint() }}</p>
  }
</div>
