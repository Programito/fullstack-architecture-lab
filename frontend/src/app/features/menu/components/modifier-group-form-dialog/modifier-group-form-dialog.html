<app-dialog
  [open]="open()"
  [title]="dialogTitle()"
  [showActions]="true"
  [confirmLabel]="confirmButtonLabel()"
  [confirmDisabled]="!isValid()"
  [confirmLoading]="loading()"
  [cancelLabel]="'menu.product.form.cancel' | transloco"
  (closed)="closed.emit()"
  (cancelled)="closed.emit()"
  (confirmed)="handleConfirm()"
>
  <div class="grid gap-4">
    <app-input
      [label]="'menu.modifierGroup.form.nameLabel' | transloco"
      [placeholder]="'menu.modifierGroup.form.namePlaceholder' | transloco"
      [value]="name()"
      [disabled]="loading()"
      (valueChange)="name.set($event)"
    />

    <div class="grid gap-3 sm:grid-cols-3">
      <app-input
        [label]="'menu.product.form.nameEs' | transloco"
        [placeholder]="'menu.product.form.nameI18nPlaceholder' | transloco"
        [value]="nameEs()"
        [disabled]="loading()"
        (valueChange)="nameEs.set($event)"
      />
      <app-input
        [label]="'menu.product.form.nameCa' | transloco"
        [placeholder]="'menu.product.form.nameI18nPlaceholder' | transloco"
        [value]="nameCa()"
        [disabled]="loading()"
        (valueChange)="nameCa.set($event)"
      />
      <app-input
        [label]="'menu.product.form.nameEn' | transloco"
        [placeholder]="'menu.product.form.nameI18nPlaceholder' | transloco"
        [value]="nameEn()"
        [disabled]="loading()"
        (valueChange)="nameEn.set($event)"
      />
    </div>

    <app-select
      [label]="'menu.modifierGroup.form.typeLabel' | transloco"
      [options]="selectionTypeOptions"
      [value]="selectionType()"
      [disabled]="loading()"
      (valueChange)="selectionType.set($event === 'multiple' ? 'multiple' : 'single')"
    />

    <app-switch
      [label]="'menu.modifierGroup.form.requiredLabel' | transloco"
      [checked]="isRequired()"
      [disabled]="loading()"
      (checkedChange)="isRequired.set($event)"
    />

    <div class="grid gap-2">
      <p class="theme-label text-sm font-medium">{{ 'menu.modifierGroup.form.optionsLabel' | transloco }}</p>

      @for (option of options(); track $index) {
        <div class="grid gap-2 rounded-md border p-2">
          <div class="flex items-end gap-2">
            <div class="min-w-0 flex-1">
              <app-input
                [label]="$index === 0 ? ('menu.modifierGroup.form.optionName' | transloco) : ''"
                [placeholder]="'menu.modifierGroup.form.optionName' | transloco"
                [value]="option.name"
                [disabled]="loading()"
                (valueChange)="updateOptionName($index, $event)"
              />
            </div>
            <div class="w-24 shrink-0">
              <app-input
                [label]="$index === 0 ? ('menu.modifierGroup.form.optionPrice' | transloco) : ''"
                [placeholder]="'0.00'"
                [value]="option.priceDeltaCents === 0 ? '' : (option.priceDeltaCents / 100).toFixed(2)"
                [disabled]="loading()"
                (valueChange)="updateOptionPrice($index, $event)"
              />
            </div>
            @if (options().length > 1) {
              <app-button
                variant="neutral"
                fill="clear"
                size="sm"
                [ariaLabel]="'menu.product.form.moveUp' | transloco"
                [disabled]="loading() || $index === 0"
                (pressed)="moveOption($index, -1)"
              >
                <app-icon name="arrow_upward" size="sm" [decorative]="true" />
              </app-button>
              <app-button
                variant="neutral"
                fill="clear"
                size="sm"
                [ariaLabel]="'menu.product.form.moveDown' | transloco"
                [disabled]="loading() || $index === options().length - 1"
                (pressed)="moveOption($index, 1)"
              >
                <app-icon name="arrow_downward" size="sm" [decorative]="true" />
              </app-button>
              <app-button
                variant="neutral"
                fill="clear"
                size="sm"
                [ariaLabel]="'menu.modifierGroup.form.removeOption' | transloco"
                [disabled]="loading()"
                (pressed)="removeOption($index)"
              >
                <app-icon name="close" size="sm" [decorative]="true" />
              </app-button>
            }
          </div>

          <div class="grid gap-2 sm:grid-cols-3">
            <app-input
              [label]="$index === 0 ? ('menu.product.form.nameEs' | transloco) : ''"
              [placeholder]="'menu.product.form.nameI18nPlaceholder' | transloco"
              [value]="option.nameEs"
              [disabled]="loading()"
              (valueChange)="updateOptionNameEs($index, $event)"
            />
            <app-input
              [label]="$index === 0 ? ('menu.product.form.nameCa' | transloco) : ''"
              [placeholder]="'menu.product.form.nameI18nPlaceholder' | transloco"
              [value]="option.nameCa"
              [disabled]="loading()"
              (valueChange)="updateOptionNameCa($index, $event)"
            />
            <app-input
              [label]="$index === 0 ? ('menu.product.form.nameEn' | transloco) : ''"
              [placeholder]="'menu.product.form.nameI18nPlaceholder' | transloco"
              [value]="option.nameEn"
              [disabled]="loading()"
              (valueChange)="updateOptionNameEn($index, $event)"
            />
          </div>

          <app-image-dropzone
            size="compact"
            [imageUrl]="option.imageUrl"
            [previewAlt]="option.name || ('menu.modifierGroup.form.optionImage' | transloco)"
            [inputLabel]="'menu.modifierGroup.form.optionImage'"
            [uploadStatus]="option.uploadStatus"
            [errorMessage]="option.imageErrorMessage"
            [disabled]="loading()"
            (fileSelected)="handleOptionFileSelected($index, $event)"
            (removeRequested)="handleOptionRemoveImage($index)"
            (retryRequested)="handleOptionRetryUpload($index)"
          />
        </div>
      }

      <app-button
        variant="neutral"
        fill="outline"
        size="sm"
        [disabled]="loading()"
        (pressed)="addOption()"
      >
        <app-icon name="add" size="sm" [decorative]="true" />
        {{ 'menu.modifierGroup.form.addOption' | transloco }}
      </app-button>
    </div>
  </div>
</app-dialog>
