<app-dialog
  [open]="open()"
  [title]="dialogTitle()"
  [showActions]="true"
  [confirmLabel]="confirmLabel()"
  [confirmDisabled]="!isValid()"
  [confirmLoading]="loading()"
  [cancelLabel]="'menu.product.form.cancel' | transloco"
  size="md"
  (closed)="closed.emit()"
  (cancelled)="closed.emit()"
  (confirmed)="handleConfirm()"
>
  <div class="grid gap-4">
    <app-input
      [label]="'menu.product.form.name' | transloco"
      [placeholder]="'menu.product.form.namePlaceholder' | transloco"
      [value]="name()"
      required
      (valueChange)="name.set($event)"
    />
    <app-input
      [label]="'menu.product.form.description' | transloco"
      [placeholder]="'menu.product.form.descriptionPlaceholder' | transloco"
      [value]="description()"
      (valueChange)="description.set($event)"
    />
    <app-input
      [label]="'menu.product.form.price' | transloco"
      type="number"
      [value]="priceEuros()"
      [min]="0"
      [step]="0.01"
      (valueChange)="priceEuros.set($event)"
    />
    <app-select
      [label]="'menu.product.form.course' | transloco"
      [options]="courseOptions()"
      [value]="course()"
      (valueChange)="course.set($event)"
    />
    <app-select
      [label]="'menu.product.form.route' | transloco"
      [options]="routeOptions()"
      [value]="route()"
      (valueChange)="route.set($event)"
    />
    @if (isEdit()) {
      <app-switch
        [label]="'menu.product.form.available' | transloco"
        [checked]="available()"
        (checkedChange)="available.set($event)"
      />
    }
  </div>
</app-dialog>
