<div class="grid gap-3">
  <span class="theme-title text-sm font-medium">{{ inputLabel() | transloco }}</span>

  <div class="theme-soft-panel grid gap-3 rounded-lg border p-3">
    <div
      class="grid gap-3 rounded-md border border-dashed p-3 transition-colors"
      [class.border-cyan-500]="isDragging()"
      [class.bg-cyan-50]="isDragging()"
      [class.dark:bg-cyan-950/20]="isDragging()"
      (dragover)="handleDragOver($event)"
      (dragleave)="handleDragLeave()"
      (drop)="handleDrop($event)"
    >
      <div class="flex min-h-40 items-center justify-center overflow-hidden rounded-md border bg-black/5 dark:bg-white/5">
        @if (hasImage()) {
          <img
            [src]="imageUrl()!"
            [alt]="previewAlt() || (inputLabel() | transloco)"
            class="h-40 w-full object-cover"
          />
        } @else {
          <div class="grid justify-items-center gap-1 text-center">
            <span class="theme-muted text-sm font-medium">{{ 'menu.product.form.noImage' | transloco }}</span>
            <span class="theme-muted text-xs">{{ 'menu.product.form.dropImageHint' | transloco }}</span>
          </div>
        }
      </div>

      <input
        #fileInput
        type="file"
        class="sr-only"
        [attr.accept]="accept()"
        [disabled]="!canSelect()"
        (change)="handleFileChange($event)"
      />

      <div class="flex flex-wrap gap-2">
        <button
          type="button"
          class="theme-field inline-flex min-h-10 items-center rounded-md border px-3 text-sm font-medium transition-colors hover:border-cyan-500 disabled:cursor-not-allowed disabled:opacity-60"
          [disabled]="!canSelect()"
          (click)="openFilePicker()"
        >
          @if (uploadStatus() === 'uploading') {
            {{ 'menu.product.form.uploadingImage' | transloco }}
          } @else if (hasImage()) {
            {{ 'menu.product.form.replaceImage' | transloco }}
          } @else {
            {{ 'menu.product.form.uploadImage' | transloco }}
          }
        </button>

        <button
          type="button"
          class="theme-field inline-flex min-h-10 items-center rounded-md border px-3 text-sm font-medium transition-colors hover:border-red-400 disabled:cursor-not-allowed disabled:opacity-60"
          [disabled]="!canRemove()"
          (click)="removeRequested.emit()"
        >
          {{ 'menu.product.form.removeImage' | transloco }}
        </button>

        @if (canRetry()) {
          <button
            type="button"
            class="theme-field inline-flex min-h-10 items-center rounded-md border px-3 text-sm font-medium transition-colors hover:border-amber-400"
            (click)="retryRequested.emit()"
          >
            {{ 'menu.product.form.retryUpload' | transloco }}
          </button>
        }
      </div>
    </div>

    @if (errorMessage()) {
      <p class="text-sm text-red-500 dark:text-red-400">{{ errorMessage() }}</p>
    }
  </div>
</div>
