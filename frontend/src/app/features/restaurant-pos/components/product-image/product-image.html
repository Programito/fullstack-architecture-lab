<div
  class="product-image"
  [class.product-image--circle]="shape() === 'circle'"
  [style.width]="dimension()"
  [style.height]="dimension()"
  data-product-image
>
  @if (state() === 'error') {
    <span class="product-image__fallback" data-product-image-fallback>
      <app-icon name="image" [decorative]="true" />
    </span>
  } @else {
    <img
      class="product-image__image"
      [class.product-image__image--hidden]="state() === 'loading'"
      [src]="imageUrl()"
      [alt]="alt()"
      (load)="markLoaded()"
      (error)="markFailed()"
    />

    @if (state() === 'loading') {
      <app-skeleton class="product-image__skeleton" shape="block" width="100%" height="100%" decorative />
    }
  }
</div>
