<app-dialog
  [open]="open()"
  [title]="'restaurantPos.service.searchProduct' | transloco"
  [description]="'restaurantPos.service.searchProductDescription' | transloco"
  [closeAriaLabel]="'restaurantPos.service.closeProductSearch' | transloco"
  size="lg"
  (closed)="closed.emit()"
>
  <div class="grid gap-4">
    <app-search-input
      [label]="'restaurantPos.service.searchProduct' | transloco"
      [placeholder]="'restaurantPos.service.searchProductPlaceholder' | transloco"
      [value]="query()"
      [clearAriaLabel]="'restaurantPos.service.clearProductSearch' | transloco"
      (valueChange)="queryChanged.emit($event)"
      (searched)="searched.emit($event)"
    />

    <div class="grid gap-3 sm:grid-cols-[auto_minmax(12rem,1fr)] sm:items-end">
      <app-segmented-control
        size="sm"
        variant="pill"
        [ariaLabel]="'restaurantPos.service.productView' | transloco"
        [options]="productViewOptions()"
        [value]="productView()"
        (valueChange)="changeProductView($event)"
      />

      <app-select
        size="sm"
        fill="outline"
        variant="neutral"
        [label]="'restaurantPos.service.productCategoryFilter' | transloco"
        [value]="productCategoryFilter()"
        [options]="productCategoryOptions()"
        (valueChange)="productCategoryFilterChanged.emit($event)"
      />
    </div>

    <div data-testid="product-search-results" class="grid h-[22rem] content-start gap-2 overflow-y-auto pr-1">
      @for (product of products(); track product.id) {
        <div class="theme-field grid min-h-16 grid-cols-[minmax(0,1fr)_2.5rem] items-stretch gap-2 rounded-md border p-1 text-sm">
          <button
            type="button"
            class="flex min-w-0 items-center justify-between gap-4 rounded px-2 py-1 text-left transition hover:bg-cyan-50 focus:outline-none focus-visible:ring-2 focus-visible:ring-cyan-500 dark:hover:bg-cyan-950/25"
            (click)="productSelected.emit(product.id)"
          >
            <span class="min-w-0">
              <span class="theme-title block truncate font-semibold">{{ product.name }}</span>
              <span class="theme-muted block truncate text-xs">{{ product.category }} &middot; {{ productAllergenLabel(product) }}</span>
              @if (wasRecentlyAdded(product.id)) {
                <span class="mt-1 inline-flex rounded-full border border-emerald-200 bg-emerald-50 px-2 py-0.5 text-xs font-semibold text-emerald-800 dark:border-emerald-800 dark:bg-emerald-950/30 dark:text-emerald-200" aria-live="polite">
                  {{ 'restaurantPos.service.productAdded' | transloco }}
                </span>
              }
            </span>
            <span class="shrink-0 font-semibold">{{ formatCurrency(product.price) }}</span>
          </button>
          <button
            type="button"
            class="group grid transform-gpu place-items-center rounded text-cyan-700 transition-[background-color,color,transform] duration-150 ease-out hover:bg-cyan-50 active:scale-95 focus:outline-none focus-visible:ring-2 focus-visible:ring-cyan-500 aria-pressed:scale-105 aria-pressed:bg-amber-50 aria-pressed:text-amber-600 dark:text-cyan-200 dark:hover:bg-cyan-950/25 dark:aria-pressed:bg-amber-950/25 dark:aria-pressed:text-amber-300"
            [attr.aria-label]="favoriteAriaLabel(product)"
            [attr.aria-pressed]="isFavorite(product.id)"
            (click)="favoriteToggled.emit(product.id)"
          >
            <span class="inline-block text-lg leading-none transition-transform duration-150 ease-out group-active:scale-90" aria-hidden="true">
              @if (isFavorite(product.id)) {
                &#9733;
              } @else {
                &#9734;
              }
            </span>
          </button>
        </div>
      } @empty {
        <p class="theme-muted rounded-md border border-dashed px-3 py-4 text-sm">{{ 'restaurantPos.service.noProductResults' | transloco }}</p>
      }
    </div>
  </div>
</app-dialog>
