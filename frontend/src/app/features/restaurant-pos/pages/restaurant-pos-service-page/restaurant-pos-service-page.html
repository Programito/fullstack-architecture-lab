<main class="theme-page min-h-dvh">
  <header class="theme-header border-b px-4 py-4 lg:px-6">
    <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
      <div>
        <p class="theme-muted text-sm font-medium">{{ 'restaurantPos.service.eyebrow' | transloco }}</p>
        <h1 class="theme-title text-2xl font-semibold">{{ 'restaurantPos.service.title' | transloco }}</h1>
      </div>

      <nav class="flex flex-wrap items-center gap-2" [attr.aria-label]="'restaurantPos.service.sections' | transloco">
        <div class="theme-panel flex items-center gap-1 rounded-lg border px-1 py-1 shadow-sm">
          <app-color-mode-menu appearance="minimal" size="sm" />
          <app-language-select appearance="minimal" size="sm" [showLabel]="false" [showHint]="false" />
        </div>
        <a class="theme-nav-link rounded-md border px-3 py-2 text-sm font-medium" routerLink="/restaurant-pos/layout">
          {{ 'restaurantPos.common.layout' | transloco }}
        </a>
        <a class="theme-nav-link-active rounded-md border px-3 py-2 text-sm font-medium" routerLink="/restaurant-pos/service">
          {{ 'restaurantPos.common.service' | transloco }}
        </a>
      </nav>
    </div>
  </header>

  <section class="theme-panel mx-auto mt-6 max-w-3xl rounded-lg border p-6 shadow-sm">
    <p class="theme-muted text-sm leading-6">
      {{ 'restaurantPos.service.description' | transloco }}
    </p>
  </section>
</main>
